name: PR Preview (GitHub Pages)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Build preview folder
        run: |
          set -eux
          PR_NUMBER="${{ github.event.pull_request.number || github.run_number }}"
          PR_DIR="pr-${PR_NUMBER}"
          mkdir -p "dist/${PR_DIR}"
          cp index.html styles.css game.js "dist/${PR_DIR}/"
          cp -R specs "dist/${PR_DIR}/specs"

      - name: Deploy to gh-pages branch subfolder
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: false

      - name: Upsert preview comment on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n🔎 Preview prête : ${process.env.PREVIEW_URL}\n${marker}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Add preview URL to PR body
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/
        with:
          script: |
            const marker = '<!-- pr-preview-url -->';
            const line = `🔎 Preview URL: ${process.env.PREVIEW_URL}`;
            const pr = context.payload.pull_request;
            let body = pr.body || '';
            const block = `${marker}\n${line}\n${marker}`;
            const regex = new RegExp(`${marker}[\\s\\S]*?${marker}`, 'm');
            body = regex.test(body) ? body.replace(regex, block) : `${body}\n\n${block}`.trim();
            await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, body });
